workflows:
  ios-release:
    name: Build iOS
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Clean build
        script: |
          flutter clean
          rm -rf ios/Pods ios/Podfile.lock

      - name: Install dependencies
        script: |
          flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign

      - name: Create IPA
        script: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r StripChat-iOS.ipa Payload
          rm -rf Payload

    artifacts:
      - StripChat-iOS.ipa
